name: ZIOT EMS IOT2050

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build and publish IOT2050 image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build ZIOT Edge jar
        run: |
          chmod +x ./gradlew
          ./gradlew buildZiotEdge --console=plain --warn

      - name: Verify ZIOT runtime bundles
        run: |
          test -f build/ziot-edge.jar
          jar tf build/ziot-edge.jar | grep 'jar/io.openems.edge.ziot.generic.jar'
          jar tf build/ziot-edge.jar | grep 'jar/io.openems.edge.controller.pvinverter.fixpowerlimit.jar'
          jar tf build/ziot-edge.jar | grep 'jar/io.openems.edge.controller.pvinverter.selltogridlimit.jar'
          jar tf build/ziot-edge.jar | grep 'jar/io.openems.edge.controller.hybrid.pvess.jar'

      - name: Upload ZIOT Edge jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ziot-edge-iot2050
          path: build/ziot-edge.jar
          if-no-files-found: error

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker_tags
        env:
          DOCKERHUB_IMAGE: doanhnguyen01/ziot
        run: |
          set -euo pipefail

          DOCKERHUB_ENABLED="false"
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            DOCKERHUB_ENABLED="true"
          fi

          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER}/ziot_ems"
          SHA_TAG="ziot-edge-iot2050-${GITHUB_SHA}"
          REF_NAME="${GITHUB_REF_NAME}"

          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:${SHA_TAG}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${GHCR_IMAGE}:ziot-edge-iot2050"
            fi
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${GHCR_IMAGE}:ziot-edge-iot2050-${REF_NAME}"
            fi
            if [ "${DOCKERHUB_ENABLED}" = "true" ]; then
              echo "${DOCKERHUB_IMAGE}:${SHA_TAG}"
              if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
                echo "${DOCKERHUB_IMAGE}:ziot-edge-iot2050"
              fi
              if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
                echo "${DOCKERHUB_IMAGE}:ziot-edge-iot2050-${REF_NAME}"
              fi
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=ZIOT Edge IOT2050"
            echo "org.opencontainers.image.description=Minimal ZIOT EMS Edge runtime for Siemens IOT2050 ARM64"
            echo "org.opencontainers.image.vendor=ZIOT by DoanhGn"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push IOT2050 Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/ziot-edge.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          labels: ${{ steps.docker_tags.outputs.labels }}
          provenance: mode=max
          sbom: true
