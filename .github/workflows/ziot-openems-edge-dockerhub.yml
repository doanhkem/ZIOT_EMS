name: ZIOT OpenEMS Edge DockerHub

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "ziot-*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build OpenEMS Edge jar
        run: |
          chmod +x ./gradlew
          ./gradlew buildEdge --console=plain --warn

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/docker/ziot-edge/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            doanhnguyen01/ziot:openems-edge
            doanhnguyen01/ziot:openems-edge-${{ github.sha }}