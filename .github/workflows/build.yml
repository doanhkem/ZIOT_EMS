name: Build ZIOT EMS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-edge:
    name: Build ZIOT Edge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build ZIOT Edge jar
        run: |
          chmod +x ./gradlew
          ./gradlew buildZiotEdge --console=plain --warn

      - name: Verify ZIOT runtime bundles
        run: |
          test -f build/ziot-edge.jar
          jar tf build/ziot-edge.jar | grep 'jar/io.openems.edge.ziot.generic.jar'
          jar tf build/ziot-edge.jar | grep 'jar/io.openems.edge.controller.pvinverter.fixpowerlimit.jar'
          jar tf build/ziot-edge.jar | grep 'jar/io.openems.edge.controller.pvinverter.selltogridlimit.jar'
          jar tf build/ziot-edge.jar | grep 'jar/io.openems.edge.controller.hybrid.pvess.jar'

      - name: Upload ZIOT Edge jar
        uses: actions/upload-artifact@v4
        with:
          name: ziot-edge-iot2050
          path: build/ziot-edge.jar
          if-no-files-found: error
