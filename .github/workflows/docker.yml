name: Publish ZIOT Edge IOT2050 Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and push ARM64 image for IOT2050
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build ZIOT Edge jar
        run: |
          chmod +x ./gradlew
          ./gradlew buildZiotEdge --console=plain --warn

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker_tags
        env:
          DOCKERHUB_ENABLED: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          DOCKERHUB_IMAGE: doanhnguyen01/ziot
        run: |
          set -euo pipefail

          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER}/ziot_ems"
          SHA_TAG="ziot-edge-iot2050-${GITHUB_SHA}"
          REF_NAME="${GITHUB_REF_NAME}"

          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:${SHA_TAG}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${GHCR_IMAGE}:ziot-edge-iot2050"
            fi
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${GHCR_IMAGE}:ziot-edge-iot2050-${REF_NAME}"
            fi
            if [ "${DOCKERHUB_ENABLED}" = "true" ]; then
              echo "${DOCKERHUB_IMAGE}:${SHA_TAG}"
              if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
                echo "${DOCKERHUB_IMAGE}:ziot-edge-iot2050"
              fi
              if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
                echo "${DOCKERHUB_IMAGE}:ziot-edge-iot2050-${REF_NAME}"
              fi
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=ZIOT Edge IOT2050"
            echo "org.opencontainers.image.description=Minimal ZIOT EMS Edge runtime for Siemens IOT2050 ARM64"
            echo "org.opencontainers.image.vendor=ZIOT by DoanhGn"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push IOT2050 Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/ziot-edge.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          labels: ${{ steps.docker_tags.outputs.labels }}
          provenance: mode=max
          sbom: true
