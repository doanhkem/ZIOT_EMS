name: Release ZIOT EMS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build ZIOT Edge jar
        run: |
          chmod +x ./gradlew
          ./gradlew buildZiotEdge --console=plain --warn
          cp build/ziot-edge.jar build/ziot-edge-iot2050.jar

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            build/ziot-edge-iot2050.jar
